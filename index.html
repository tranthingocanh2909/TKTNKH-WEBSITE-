        // Đặt sau nội dung chữ bằng CSS z-index để hoa đào ẩn sau chữ
        const SakuraFallingBackground = () => {
            const canvasRef = useRef(null);

            useEffect(() => {
                const canvas = canvasRef.current;
                const ctx = canvas.getContext("2d");
                let animationFrameId;

                const resizeCanvas = () => {
                    canvas.width = window.innerWidth;
                    canvas.height = window.innerHeight;
                };
                window.addEventListener("resize", resizeCanvas);
                resizeCanvas();

                const petalCount = 45;
                const petals = [];

                for (let i = 0; i < petalCount; i++) {
                    petals.push({
                        x: Math.random() * canvas.width,
                        y: Math.random() * canvas.height - canvas.height,
                        r: Math.random() * 6 + 4, // Bán kính
                        d: Math.random() * petalCount, // Mật độ chuyển động
                        amplitude: Math.random() * 1.5 + 0.5,
                        speedY: Math.random() * 1.2 + 0.8,
                        angle: Math.random() * 360,
                        spinSpeed: Math.random() * 2 - 1,
                    });
                }

                const draw = () => {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    
                    petals.forEach((p) => {
                        ctx.save();
                        ctx.translate(p.x, p.y);
                        ctx.rotate((p.angle * Math.PI) / 180);
                        
                        // Tạo hình cánh hoa đào mềm mại bằng cách vẽ 2 đường cong Bezier
                        ctx.beginPath();
                        ctx.moveTo(0, 0);
                        ctx.bezierCurveTo(-p.r * 1.5, -p.r * 1.5, -p.r * 2, p.r / 2, 0, p.r * 2);
                        ctx.bezierCurveTo(p.r * 2, p.r / 2, p.r * 1.5, -p.r * 1.5, 0, 0);
                        
                        // Màu hồng đào phấn pha tím nhẹ
                        const gradient = ctx.createRadialGradient(-2, -2, 0, 0, 0, p.r * 2);
                        gradient.addColorStop(0, '#fff1f2'); // Hồng siêu nhạt
                        gradient.addColorStop(0.6, '#fbcfe8'); // Hồng đào
                        gradient.addColorStop(1, '#f472b6'); // Hồng đậm cánh sen

                        ctx.fillStyle = gradient;
                        ctx.shadowBlur = 4;
                        ctx.shadowColor = 'rgba(244, 63, 94, 0.2)';
                        ctx.fill();
                        ctx.restore();

                        // Cập nhật vị trí rơi tự nhiên, không xếp hàng ngang
                        p.y += p.speedY;
                        p.x += Math.sin(p.y / 30) * p.amplitude;
                        p.angle += p.spinSpeed;

                        // Nếu rơi quá màn hình, trả về đỉnh ngẫu nhiên
                        if (p.y > canvas.height) {
                            p.y = -20;
                            p.x = Math.random() * canvas.width;
                            p.speedY = Math.random() * 1.2 + 0.8;
                        }
                    });

                    animationFrameId = requestAnimationFrame(draw);
                };

                draw();

                return () => {
                    window.removeEventListener("resize", resizeCanvas);
                    cancelAnimationFrame(animationFrameId);
                };
            }, []);

            // Z-index: 5 là ở phía sau, các phần tử văn bản sẽ có z-index lớn hơn để hoa rơi ẩn sau chữ
            return (
                <canvas 
                    ref={canvasRef} 
                    className="fixed top-0 left-0 w-full h-full pointer-events-none"

                />
            );

                                                            {cabinetsSearched && (
                                                                <button onClick={() => { setHauntedZone(3); setHauntedLog(["Khóa đã mở, bạn run rẩy tiến sang Phòng ngủ cô tịch.", ...hauntedLog]); }} className="p-2 bg-red-600 hover:bg-red-700 rounded text-xs font-bold text-center">🛏️ Sang Phòng ngủ</button>
                                                            )}
                                                        </>
                                                    )}

                                                    {hauntedZone === 3 && (
                                                        <>
                                                            <button onClick={() => handleHauntedInteract('nap_on_futon')} className="p-2 bg-red-900/40 hover:bg-red-900/60 rounded text-xs text-left border border-red-500/30">🛏️ Nằm xuống nệm Futon</button>
                                                            {hasNapped && (
                                                                <button onClick={() => { setHauntedZone(4); setHauntedLog(["Tiếng bước chân gấp gáp rầm rầm rượt đuổi phía sau, bạn chạy sang Hành lang vô tận!", ...hauntedLog]); }} className="p-2 bg-red-600 hover:bg-red-700 rounded text-xs font-bold text-center">🏃 Chạy sang Hành lang</button>
                                                            )}
                                                        </>
                                                    )}

                                                    {hauntedZone === 4 && (
                                                        <>
                                                            <button onClick={() => triggerHauntedEnding('bad')} className="p-2 bg-gray-800 hover:bg-gray-700 rounded text-xs text-center border border-gray-600">🏃 Hoảng sợ Chạy Thoát Thân</button>
                                                            {hauntedInventory.includes('death_letter') && (
                                                                <button onClick={() => triggerHauntedEnding('true')} className="p-2 bg-green-900/80 hover:bg-green-800 rounded text-xs font-bold text-center border border-green-500">📜 Đưa bức thư báo tử cũ</button>
                                                            )}
                                                            {hauntedInventory.includes('family_photo') && (
                                                                <button onClick={() => triggerHauntedEnding('secret')} className="p-2 bg-yellow-600 hover:bg-yellow-700 rounded text-xs font-bold text-center border border-yellow-400">🖼️ Đưa bức ảnh gia đình kỷ vật</button>
                                                            )}
                                                        </>
                                                    )}
                                                </div>
                                            </div>
                                        </div>

                                        {/* Reset game */}
                                        <div className="mt-6 pt-4 border-t border-red-500/20 flex justify-between items-center text-xs">
                                            <span className="text-red-400 font-bold">Vật dụng đang có: {hauntedInventory.length === 0 ? "Chưa có" : hauntedInventory.map(i => i === 'death_letter' ? '📜 Thư báo tử' : '🖼️ Ảnh gia đình').join(', ')}</span>
                                            <button onClick={() => { setHauntedZone(1); setHauntedInventory([]); setHasNapped(false); setCabinetsSearched(false); setHauntedLog(["Khởi động lại hành trình nhà ma..."]); }} className="text-[10px] text-gray-400 hover:text-white underline">Khởi động lại 🔄</button>
                                        </div>
                                    </div>

                                    {/* Bên phải: Nhật ký hành động & Phần thưởng */}
                                    <div className="bg-white rounded-2xl p-5 border border-pink-100 flex flex-col justify-between">
                                        <div>
                                            <h4 className="text-xs font-bold text-gray-800 uppercase tracking-widest mb-3">
                                                📝 Nhật ký tâm linh
                                            </h4>
                                            <div className="space-y-2 max-h-[220px] overflow-y-auto pr-1">
                                                {hauntedLog.map((log, index) => (
                                                    <div key={index} className="text-xs text-gray-600 leading-normal border-b border-gray-50 pb-1.5 last:border-0 italic">
                                                        {log}
                                                    </div>
                                                ))}
                                            </div>
                                        </div>

                                        <div className="mt-6 pt-4 border-t border-gray-100 space-y-3">
                                            <span className="text-xs font-bold text-gray-700 uppercase tracking-wider block">🏆 Quà tặng Kick-sale hấp dẫn:</span>
                                            <div className="p-3 bg-yellow-50 rounded-lg text-[11px] text-yellow-800 border border-yellow-200">
                                                <p className="font-bold">Nhận Voucher miễn phí hoặc Quà lưu niệm VIP:</p>
                                                <ul className="list-disc pl-3.5 space-y-1 mt-1 font-medium">
                                                    <li>Đạt True Ending: Voucher ẩm thực 50k</li>
                                                    <li>Đạt Secret Ending: Quà lưu niệm VIP</li>
                                                </ul>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* --- TRANG ĐĂNG KÝ COSPLAY CONTEST --- */}
                        {activeTab === 'cosplay' && (
                            <div className="max-w-6xl mx-auto px-4 py-12 animate-fadeIn">
                                <div className="text-center mb-10">
                                    <span className="px-3 py-1 bg-pink-100 text-pink-700 text-xs font-bold rounded-full uppercase tracking-widest">SÂN CHƠI LỚN NHẤT NĂM</span>
                                    <h2 className="text-2xl sm:text-3xl font-bold text-gray-900 font-heading mt-2">
                                        🏆 Gigamall Sakura Cosplay Contest 2026
                                    </h2>
                                    <p className="text-xs text-gray-500 mt-2">{translations[lang].cosplayFormSubtitle}</p>
                                </div>

                                <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                                    {/* Form Đăng ký */}
                                    <div className="lg:col-span-1 bg-white rounded-2xl p-6 border border-pink-100 shadow-sm h-fit">
                                        <h3 className="text-sm font-bold text-gray-800 uppercase tracking-widest mb-4">
                                            📝 {translations[lang].fullName}
                                        </h3>
                                        <form onSubmit={handleCosplaySubmit} className="space-y-4">
                                            <div>
                                                <label className="block text-xs font-semibold text-gray-600 mb-1">Coser Name / Tên Thí Sinh</label>
                                                <input 
                                                    type="text"
                                                    required
                                                    value={cosplayReg.fullName}
                                                    onChange={(e) => setCosplayReg({ ...cosplayReg, fullName: e.target.value })}
                                                    className="w-full p-2 text-xs rounded-lg border border-gray-200 focus:outline-none focus:ring-2 focus:ring-pink-400 bg-white"
                                                    placeholder="e.g. Minami Chan, Kenji..."
                                                />
                                            </div>

                                            <div>
                                                <label className="block text-xs font-semibold text-gray-600 mb-1">Mạng xã hội (Profile Link)</label>
                                                <input 
                                                    type="text"
                                                    required
                                                    value={cosplayReg.fbLink}
                                                    onChange={(e) => setCosplayReg({ ...cosplayReg, fbLink: e.target.value })}
                                                    className="w-full p-2 text-xs rounded-lg border border-gray-200 focus:outline-none bg-white"
                                                    placeholder="https://facebook.com/yourprofile"
                                                />
                                            </div>

                                            <div>
                                                <label className="block text-xs font-semibold text-gray-600 mb-1">Nhân vật hóa trang (Character)</label>
                                                <input 
                                                    type="text"
                                                    required
                                                    value={cosplayReg.charName}
                                                    onChange={(e) => setCosplayReg({ ...cosplayReg, charName: e.target.value })}
                                                    className="w-full p-2 text-xs rounded-lg border border-gray-200 focus:outline-none bg-white"
                                                    placeholder="e.g. Kinomoto Sakura"
                                                />
                                            </div>

                                            <div>
                                                <label className="block text-xs font-semibold text-gray-600 mb-1">{translations[lang].uploadPhoto}</label>
                                                <input 
                                                    type="text"
                                                    value={cosplayReg.avatar}
                                                    onChange={(e) => setCosplayReg({ ...cosplayReg, avatar: e.target.value })}
                                                    className="w-full p-2 text-xs rounded-lg border border-gray-200 focus:outline-none bg-white"
                                                    placeholder="Nhập đường dẫn ảnh (URL)..."
                                                />
                                            </div>

                                            <button 
                                                type="submit"
                                                className="w-full py-2.5 bg-pink-500 text-white font-bold rounded-lg text-xs hover:bg-pink-600 transition uppercase tracking-wider font-heading"
                                            >
                                                ✨ {translations[lang].submitReg}
                                            </button>
                                        </form>
                                    </div>

                                    {/* Danh sách Thí sinh profile */}
                                    <div className="lg:col-span-2">
                                        <div className="bg-white rounded-2xl p-6 border border-pink-100 shadow-sm">
                                            <h3 className="text-sm font-bold text-gray-800 uppercase tracking-widest mb-6">
                                                👥 {translations[lang].contestantList}
                                            </h3>

                                            <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                                {contestants.map(c => (
                                                    <div key={c.id} className="flex gap-4 p-4 rounded-xl border border-gray-100 bg-pink-50/10 hover:shadow-md transition">
                                                        <img 
                                                            src={c.avatar} 
                                                            alt={c.name}
                                                            className="w-20 h-20 object-cover rounded-xl border border-pink-100 shadow-sm"
                                                            onError={(e) => { e.target.src = "https://images.unsplash.com/photo-1542751371-adc38448a05e?auto=format&fit=crop&q=80&w=300" }}
                                                        />
                                                        <div className="flex flex-col justify-between flex-grow">
                                                            <div>
                                                                <h4 className="text-xs font-bold text-gray-900">{c.name}</h4>
                                                                <p className="text-[10px] text-pink-600 font-semibold mt-0.5">Hóa thân: {c.char}</p>
                                                            </div>
                                                            <div className="flex items-center justify-between mt-2 pt-2 border-t border-dashed border-gray-100">
                                                                <span className="text-[10px] text-gray-500">🔥 {c.votes} Lượt bầu</span>
                                                                <button 
                                                                    onClick={() => handleVoteCoser(c.id)}
                                                                    className={`px-3 py-1 rounded-full text-[10px] font-bold ${c.voted ? 'bg-pink-100 text-pink-600' : 'bg-gray-100 text-gray-600'}`}
                                                                >
                                                                    💖 {c.voted ? translations[lang].voted : translations[lang].vote}
                                                                </button>
                                                            </div>
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>

                                    <h2 className="text-2xl sm:text-3xl font-bold text-gray-900 font-heading mt-2">
                                        🌐 {translations[lang].communityTab}
                                    </h2>
                                    <p className="text-xs text-gray-500 mt-2">Nơi hội tụ, giao lưu và bình chọn các tác phẩm mang đậm hơi thở văn hóa Sakura 2026</p>
                                </div>

                                <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                    {/* 1. Nhóm cộng đồng nhỏ: Thiết kế Yukata */}
                                    <div className="bg-white rounded-2xl p-5 border border-pink-100 shadow-sm flex flex-col justify-between">
                                        <div>
                                            <span className="text-[10px] bg-pink-100 text-pink-700 font-bold px-2 py-0.5 rounded-full uppercase">Yukata Studio</span>
                                            <h3 className="text-sm font-bold text-gray-900 mt-2 mb-4">
                                                🌸 {translations[lang].subCommYukata}
                                            </h3>
                                            
                                            <div className="space-y-3 max-h-[220px] overflow-y-auto pr-1">
                                                {communityYukatas.map(cy => (
                                                    <div key={cy.id} className="p-3 rounded-lg bg-pink-50/10 border text-xs">
                                                        <p className="font-bold">Mẫu thiết kế của {cy.creator}</p>
                                                        <p className="text-gray-500 text-[10px] mt-0.5">Tông màu: {cy.color} | Họa tiết: {cy.pattern}</p>
                                                        <div className="flex justify-between items-center mt-2.5 pt-2 border-t border-dashed border-gray-100">
                                                            <span className="text-[10px] text-gray-400">👍 {cy.votes} bình chọn</span>
                                                            <button 
                                                                onClick={() => {
                                                                    setCommunityYukatas(communityYukatas.map(c => c.id === cy.id ? { ...c, votes: c.voted ? c.votes - 1 : c.votes + 1, voted: !c.voted } : c));
                                                                    addHistory(`Bình chọn Yukata cộng đồng mã số #${cy.id}`);
                                                                }}
                                                                className={`px-2.5 py-0.5 rounded text-[10px] font-bold ${cy.voted ? 'bg-pink-100 text-pink-600' : 'bg-gray-100 text-gray-600'}`}
                                                            >
                                                                {cy.voted ? "Đã vote" : "Bình chọn"}
                                                            </button>
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    </div>

                                    {/* 2. Nhóm cộng đồng nhỏ: Manga & Photobooth */}
                                    <div className="bg-white rounded-2xl p-5 border border-pink-100 shadow-sm flex flex-col justify-between">
                                        <div>
                                            <span className="text-[10px] bg-purple-100 text-purple-700 font-bold px-2 py-0.5 rounded-full uppercase">Manga Room</span>
                                            <h3 className="text-sm font-bold text-gray-900 mt-2 mb-4">
                                                🗼 {translations[lang].subCommManga}
                                            </h3>

                                            <div className="space-y-3 max-h-[220px] overflow-y-auto pr-1">
                                                {oneShots.map(os => (
                                                    <div key={os.id} className="p-3 rounded-lg bg-purple-50/10 border text-xs">
                                                        <p className="font-bold text-purple-700">"{os.title}"</p>
                                                        <p className="text-gray-500 text-[10px] mt-0.5">Bản quyền: {os.theme} | Tạo bởi: {os.creator}</p>
                                                        <div className="flex justify-between items-center mt-2.5 pt-2 border-t border-dashed border-gray-100">
                                                            <span className="text-[10px] text-gray-400">👍 {os.votes} bầu</span>
                                                            <button 
                                                                onClick={() => {
                                                                    setOneShots(oneShots.map(o => o.id === os.id ? { ...o, votes: o.voted ? o.votes - 1 : o.votes + 1, voted: !o.voted } : o));
                                                                }}
                                                                className={`px-2.5 py-0.5 rounded text-[10px] font-bold ${os.voted ? 'bg-pink-100 text-pink-600' : 'bg-gray-100 text-gray-600'}`}
                                                            >
                                                                {os.voted ? "Đã vote" : "Bình chọn"}
                                                            </button>
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    </div>

                                    {/* 3. Nhóm cộng đồng nhỏ: Cây nguyện ước */}
                                    <div className="bg-white rounded-2xl p-5 border border-pink-100 shadow-sm flex flex-col justify-between">
                                        <div>
                                            <span className="text-[10px] bg-green-100 text-green-700 font-bold px-2 py-0.5 rounded-full uppercase">Wish Garden</span>
                                            <h3 className="text-sm font-bold text-gray-900 mt-2 mb-4">
                                                🌿 {translations[lang].subCommWishes}
                                            </h3>

                                            <div className="space-y-3 max-h-[220px] overflow-y-auto pr-1">
                                                {digitalWishes.map(dw => (
                                                    <div key={dw.id} className="p-3 rounded-lg bg-green-50/10 border text-xs">
                                                        <p className="text-gray-600 font-medium italic">"{dw.content}"</p>
                                                        <div className="flex justify-between items-center mt-2 pt-2 border-t border-dashed border-gray-100 text-[10px] text-gray-400">
                                                            <span>#{dw.hashtag}</span>
                                                            <span>{dw.user}</span>
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* --- LỊCH SỬ THAM GIA HOẠT ĐỘNG --- */}
                        {activeTab === 'history' && (
                            <div className="max-w-3xl mx-auto px-4 py-12 animate-fadeIn">
                                <div className="text-center mb-10">
                                    <h2 className="text-2xl sm:text-3xl font-bold text-gray-900 font-heading">
                                        ⏳ {translations[lang].history}
                                    </h2>
                                    <p className="text-xs text-gray-500 mt-2">Dấu ấn kỷ niệm của bạn tại Cung Đường Vàng Sakura Gigamall 2026</p>
                                </div>

                                <div className="bg-white rounded-2xl p-6 sm:p-8 border border-pink-100 shadow-sm">
                                    <div className="space-y-4">
                                        {historyLog.map((log) => (
                                            <div key={log.id} className="flex gap-4 p-3.5 rounded-xl border border-pink-50 bg-pink-50/5 hover:bg-pink-50/10 transition items-center">
                                                <div className="w-8 h-8 rounded-full bg-pink-100 text-pink-600 flex items-center justify-center font-bold text-xs">
                                                    ✨
                                                </div>
                                                <div className="flex-grow">
                                                    <p className="text-xs font-semibold text-gray-800">{log.action}</p>
                                                    <span className="text-[10px] text-gray-400">Thời gian ghi nhận: {log.time}</span>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}

                    </main>

                    {/* HỘP THOẠI CHATBOT AI CHỮA LỖI POP UP NỔI GÓC DƯỚI BÊN PHẢI */}
                    <div className="fixed bottom-6 right-6 z-50">
                        {chatOpen ? (
                            <div className="w-80 sm:w-96 h-[450px] bg-white rounded-2xl shadow-2xl border border-pink-100 flex flex-col justify-between overflow-hidden animate-scaleIn">
                                {/* Header Chatbot */}
                                <div className="px-4 py-3 bg-gradient-to-r from-pink-500 via-pink-600 to-purple-600 text-white flex items-center justify-between">
                                    <div className="flex items-center gap-2">
                                        <div className="w-7 h-7 rounded-full bg-white/20 flex items-center justify-center text-sm">🤖</div>
                                        <div>
                                            <h4 className="text-xs font-bold font-heading">{translations[lang].chatTitle}</h4>
                                            <span className="text-[9px] text-pink-200 uppercase font-semibold">AI Assistant</span>
                                        </div>
                                    </div>
                                    <button onClick={() => setChatOpen(false)} className="text-white hover:text-pink-200 font-black text-xs">✖</button>
                                </div>

                                {/* Khung chứa tin nhắn */}
                                <div className="flex-grow p-4 overflow-y-auto space-y-3 bg-gray-50/50">
                                    {chatMessages.map((msg, index) => (
                                        <div key={index} className={`flex ${msg.sender === 'user' ? 'justify-end' : 'justify-start'}`}>
                                            <div className={`max-w-[80%] rounded-2xl p-3 text-xs leading-relaxed shadow-sm ${msg.sender === 'user' ? 'bg-pink-600 text-white rounded-tr-none' : 'bg-white text-gray-700 border border-gray-100 rounded-tl-none'}`}>
                                                {msg.text}
                                            </div>
                                        </div>
                                    ))}
                                </div>

                                {/* Form gửi tin nhắn */}
                                <form onSubmit={handleSendMessage} className="p-3 bg-white border-t border-gray-100 flex gap-2">
                                    <input 
                                        type="text"
                                        required
                                        placeholder={translations[lang].chatPlaceholder}
                                        value={chatInput}
                                        onChange={(e) => setChatInput(e.target.value)}
                                        className="flex-grow px-3 py-2 text-xs rounded-xl border border-gray-200 focus:outline-none focus:ring-1 focus:ring-pink-500"
                                    />
                                    <button type="submit" className="px-3.5 py-2 bg-pink-500 text-white font-bold rounded-xl text-xs hover:bg-pink-600 transition">
                                         gửi
                                    </button>
                                </form>
                            </div>
                        ) : (
                            <button 
                                onClick={() => { setChatOpen(true); addHistory("Mở chatbot trò chuyện với AI"); }}
                                className="w-14 h-14 rounded-full bg-gradient-to-tr from-pink-500 via-pink-600 to-purple-600 text-white flex items-center justify-center shadow-xl hover:scale-110 hover:shadow-pink-300/30 active:scale-95 transition-all text-2xl"
                            >
                                💬
                            </button>
                        )}
                    </div>

                    {/* --- FOOTER & CRM THÔNG TIN LIÊN HỆ --- */}
                    <footer className="bg-white border-t border-pink-100 text-gray-500 text-xs py-8 px-4 transition-all z-20 relative">
                        <div className="max-w-7xl mx-auto flex flex-col md:flex-row items-center justify-between gap-6">
                            
                            {/* CRM Brand text */}
                            <div className="text-center md:text-left">
                                <h3 className="font-bold text-gray-800 text-sm uppercase tracking-wider font-heading">
                                    {translations[lang].footerCRM}
                                </h3>
                                <p className="text-[11px] text-pink-600 font-semibold tracking-widest uppercase mt-0.5 font-heading">
                                    TTTM GIGAMALL THỦ ĐỨC
                                </p>
                                <p className="mt-2 text-gray-400 font-sans max-w-md">
                                    📍 {translations[lang].footerAddress}
                                </p>
                            </div>

                            {/* Giờ hoạt động và liên hệ */}
                            <div className="text-center text-gray-400">
                                <p className="font-bold text-gray-600 mb-1">{translations[lang].footerHours}</p>
                                <p>{translations[lang].footerContact}</p>
                            </div>

                            {/* Mạng xã hội & Logo */}
                            <div className="flex flex-col items-center md:items-end gap-3">
                                <div className="flex gap-4">
                                    <a href="https://www.facebook.com/gigamallvietnam/?locale=vi_VN" target="_blank" rel="noopener noreferrer" className="p-2.5 rounded-full bg-pink-50 text-pink-600 hover:bg-pink-100 hover:scale-110 transition shadow-sm font-semibold">
                                        Facebook
                                    </a>
                                    <a href="https://www.instagram.com/gigamall_vietnam/" target="_blank" rel="noopener noreferrer" className="p-2.5 rounded-full bg-pink-50 text-pink-600 hover:bg-pink-100 hover:scale-110 transition shadow-sm font-semibold">
                                        Instagram
                                    </a>
                                    <a href="https://www.youtube.com/@GigamallVietnam" target="_blank" rel="noopener noreferrer" className="p-2.5 rounded-full bg-pink-50 text-pink-600 hover:bg-pink-100 hover:scale-110 transition shadow-sm font-semibold">
                                        YouTube
                                    </a>
                                </div>
                                <span className="text-[10px] text-gray-400">© 2026 Gigamall Shopping Center. All rights reserved.</span>
                            </div>

                        </div>
                    </footer>
                </div>
            );
        }

        // --- KHỞI CHẠY REACT ---
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
